<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I am Sorry Sawera! 🥺</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Smooth animated background */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: float 4s ease-in-out infinite;
            z-index: 10;
            position: relative;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255, 77, 109, 0.2);
        }

        /* Image Gallery Section */
        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .polaroid {
            background: white;
            padding: 10px 10px 20px 10px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transform: rotate(-5deg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .polaroid:nth-child(2) {
            transform: rotate(5deg);
        }

        .polaroid:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .polaroid img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 5px;
        }

        /* Message Section */
        .message-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px dashed #ff9a9e;
        }

        p {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #444;
            font-weight: 500;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-accept {
            background-color: #4cd137;
            color: white;
            box-shadow: 0 5px 15px rgba(76, 209, 55, 0.4);
        }

        .btn-accept:hover {
            background-color: #44bd32;
            transform: translateY(-3px) scale(1.05);
        }

        .btn-reject {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        .btn-reject:hover {
            background-color: #ff6b81;
            transform: translateY(-3px) scale(1.05);
        }

        /* Background Floating Elements */
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .element {
            position: absolute;
            font-size: 28px;
            animation: rise 8s linear infinite;
            opacity: 0.6;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        /* Custom Popup Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            transform: scale(0.7);
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .close-btn {
            background: #f1f2f6;
            color: #2f3542;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #dfe4ea;
        }
    </style>
</head>
<body>

    <div class="floating-elements">
        <div class="element" style="left: 10%; animation-duration: 6s;">🥺</div>
        <div class="element" style="left: 20%; animation-duration: 9s;">✨</div>
        <div class="element" style="left: 35%; animation-duration: 7s;">💖</div>
        <div class="element" style="left: 50%; animation-duration: 11s;">🌸</div>
        <div class="element" style="left: 70%; animation-duration: 8s;">🥺</div>
        <div class="element" style="left: 85%; animation-duration: 10s;">🐱</div>
        <div class="element" style="left: 95%; animation-duration: 7s;">✨</div>
    </div>

    <div class="container">
        <h1>I am Sorry! 🥺</h1>
        
        <div class="gallery">
            <div class="polaroid">
                <img src="https://i.ibb.co/CpS3mS1v/60813084b5b90dfc2caf43a913a93f6d.jpg" alt="Sad cute cat 1">
            </div>
            <div class="polaroid">
                <img src="https://i.ibb.co/nF727kK/1782313575143.jpg" alt="Sad cute cat 2">
            </div>
        </div>

        <div class="message-box">
            <p>
                🥺✨<br>
                Sawera i am sorry for what i did... I humbly apologize... <br>
                Maine jo bhi kaha usky liye sorry... <br>
                Ab jldi se apology accept karlo... Achy bachy naraz nhi hoty 🌸
            </p>
        </div>

        <div class="btn-group">
            <button class="btn btn-accept" onclick="showPopup('yayy!.. that is very sweet of you 🥳💖')">Accept ✨</button>
            <button class="btn btn-reject" onclick="showPopup('So you hate me this much huh! 😭.. 💔')">Reject 💔</button>
        </div>
    </div>

    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div class="modal-text" id="modalMessage"></div>
            <button class="close-btn" onclick="closePopup()">Okay</button>
        </div>
    </div>

    <script>
        function showPopup(message) {
            const modal = document.getElementById('customModal');
            const modalMessage = document.getElementById('modalMessage');
            
            modalMessage.innerHTML = message;
            modal.classList.add('active');
        }

        function closePopup() {
            const modal = document.getElementById('customModal');
            modal.classList.remove('active');
        }
    </script>

</body>
</html>
